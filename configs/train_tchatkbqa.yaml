# Training configuration for T-ChatKBQA with temporal human + synthetic data
# Build training examples first with:
# python scripts/build_temporal_dataset.py export-training-examples \
#   --human-input data/temporal/TempQuestions/train.samples.json \
#   --synthetic-input data/temporal/synthetic.samples.json \
#   --split train \
#   --include-metadata

stage: sft
model_name_or_path: meta-llama/Llama-2-7b-hf
do_train: true
dataset_dir: LLMs/data
dataset: TChatKBQA_Freebase_NQ_train
template: llama2
finetuning_type: lora
lora_target: q_proj,v_proj
output_dir: models/LLaMA2-7b-tchatkbqa/checkpoint
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
learning_rate: 5.0e-5
num_train_epochs: 50.0
fp16: true
logging_steps: 10
save_steps: 500
warmup_ratio: 0.05
