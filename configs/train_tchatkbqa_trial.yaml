# Trial training config for T-ChatKBQA (10 epochs, reduced for initial test)
stage: sft
model_name_or_path: /workspace/models/Llama-2-7b-hf
do_train: true
dataset_dir: LLMs/data
dataset: TChatKBQA_Freebase_NQ_train
template: llama2
finetuning_type: lora
lora_target: q_proj,v_proj
output_dir: models/LLaMA2-7b-tchatkbqa-trial/checkpoint
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
learning_rate: 5.0e-5
num_train_epochs: 10.0
fp16: true
logging_steps: 5
save_steps: 200
warmup_ratio: 0.05
