# Training configuration for Temporal KBQA (TempQuestions + LLaMA-2-7B)
# Run with: python -u LLMs/LLaMA/src/train_bash.py --config configs/train_temporal.yaml

stage: sft
model_name_or_path: meta-llama/Llama-2-7b-hf
do_train: true
dataset_dir: LLMs/data
dataset: TempQuestions_Freebase_NQ_train
template: llama2
finetuning_type: lora
lora_target: q_proj,v_proj
output_dir: models/LLaMA2-7b-temporal/checkpoint
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
learning_rate: 5.0e-5
num_train_epochs: 50.0
fp16: true
logging_steps: 10
save_steps: 500
warmup_ratio: 0.05
